<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>幸运抽签器</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #eef9ff 0%, #fef2f2 100%);
            --accent-blue: #7dd3fc;
            --accent-pink: #f9a8d4;
            --text-main: #475569;
            --slot-height: 90px; /* 稍微加高一点，容错率更高 */
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background: var(--bg-gradient); color: var(--text-main);
        }
        .card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            padding: 2.5rem; border-radius: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            width: 90%; max-width: 600px ;/* 宽度从420增加到600 */
            text-align: center; border: 1px solid rgba(255,255,255,0.8);
        }
        textarea {
            width: 100%; height: 120px; background: rgba(255,255,255,0.7);
            border: 2px solid var(--accent-blue); border-radius: 1rem;
            padding: 15px; margin-bottom: 1.5rem; resize: none; box-sizing: border-box;
            outline: none; transition: border-color 0.3s; font-size: 0.95rem; color: #64748b;
        }
        textarea:focus { border-color: var(--accent-pink); }
        
        /* 抽奖展示盒 */
        .slot-machine {
            height: var(--slot-height); overflow: hidden; background: white;
            border-radius: 1.2rem; margin-bottom: 1.5rem; border: 1px solid #f1f5f9;
            position: relative; box-shadow: inset 0 2px 15px rgba(0,0,0,0.03);
        }
        #scroll-container {
            position: absolute; width: 100%; top: 0; 
            transition: top 5s cubic-bezier(0.1, 0, 0.1, 1); 
        }
        .slot-item {
            height: var(--slot-height); 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; /* 字体稍微调小一点，增加宽容度 */
            font-weight: 600; color: #334155;
            padding: 0 20px; box-sizing: border-box;
            /* 处理极长文字 */
            word-break: break-all;
            line-height: 1.2;
        }

        button {
            width: 100%; background: var(--accent-blue); color: white;
            border: none; padding: 1.2rem; border-radius: 1.2rem; cursor: pointer;
            font-size: 1.1rem; font-weight: 600; transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(125, 211, 252, 0.4);
        }
        button:hover { background: var(--accent-pink); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(249, 168, 212, 0.4); }
        button:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .footer-note { font-size: 0.65rem; color: #cbd5e1; margin-top: 1.8rem; letter-spacing: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 300; letter-spacing: 2px;">祝  你  好  运</div>
    <textarea id="list" placeholder="粘贴你的文字内容（每行一条）..."></textarea>
    
    <div class="slot-machine">
        <div id="scroll-container">
            <div class="slot-item" style="color: #cbd5e1;">准备就绪</div>
        </div>
    </div>

    <button id="drawBtn" onclick="startDraw()">开始抽签</button>
    <div class="footer-note">@幸运抽签器</div>
</div>

<script>
    function startDraw() {
        const textArea = document.getElementById('list');
        const btn = document.getElementById('drawBtn');
        const text = textArea.value.trim();
        if (!text) return alert('请输入名单内容');
        
        const items = text.split('\n').map(i => i.trim()).filter(i => i !== '');
        if (items.length === 0) return;

        btn.disabled = true;
        btn.innerText = "随机生成中...";

        const container = document.getElementById('scroll-container');
        
        // --- 高安全性随机逻辑 ---
        const randomBuffer = new Uint32Array(1);
        window.crypto.getRandomValues(randomBuffer);
        const winnerIndex = randomBuffer[0] % items.length;
        const winnerName = items[winnerIndex];

        // 构造滚动列表 (增加到 40 个项目让 5 秒滚动更丝滑)
        let displayList = [];
        for(let i = 0; i < 40; i++) {
            displayList.push(items[i % items.length]);
        }
        displayList.push(winnerName); 

        container.innerHTML = displayList.map(item => `<div class="slot-item">${item}</div>`).join('');
        
        container.style.transition = 'none';
        container.style.top = '0px';
        
        setTimeout(() => {
            const itemHeight = 90; // 匹配 CSS 中的 --slot-height
            container.style.transition = 'top 5s cubic-bezier(0.1, 0, 0.1, 1)';
            const stopPosition = (displayList.length - 1) * itemHeight;
            container.style.top = `-${stopPosition}px`;
        }, 50);

        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "再次抽签";
        }, 5100);
    }
</script>

</body>
</html>
