<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日日是好日</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { 
        box-sizing: border-box; 
        }
        :root {
            --bg-color: #f8f9fa;
            --line-color: #ccc;
            --accent-color: #333;
            --text-color: #444;
            --timeline-left: 42%;
        }
        /* 针对手机端的优化（屏幕宽度小于 768px 时生效） */
        @media (max-width: 768px) {
            :root {
                /* 在手机上，让竖线靠近左边，给文字留出更多空间 */
                --timeline-left: 15%; 
            }

            .node {
                /* 手机端间距稍微缩小一点，避免太长刷不到头 */
                margin: 60px 0 60px calc(var(--timeline-left) - 5.5px);
            }

            .text {
                /* 手机端文字可以稍微宽一点，填满右侧剩余空间 */
                max-width: 70vw; 
                font-size: 15px; /* 手机端字号稍微调小一点点更精致 */
            }

            .content {
                /* 手机端时间与文字的间距 */
                gap: 4px;
            }
        }

        body, html {
            margin: 0; padding: 0; width: 100%;height: 100%;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .edge-mask {
            position: fixed; left: 0; width: 100%; z-index: 20; pointer-events: none;
            opacity: 0; transition: opacity 1.2s ease;
        }
        .active-mask { opacity: 1; }
        .top-mask { top: 0; height: 35vh; background: linear-gradient(to bottom, var(--bg-color) 20%, transparent); }
        .bottom-mask { bottom: 0; height: 45vh; background: linear-gradient(to top, var(--bg-color) 35%, transparent); }

        #timeline-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
            z-index: 5;
            opacity: 0; transition: opacity 1.5s ease;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .active-container { opacity: 1 !important; }
        #timeline-container::-webkit-scrollbar { display: none; }

        #timeline-inner { position: relative; width: 100%; padding: 50vh 0; }

        #v-line {
            position: absolute; left: var(--timeline-left);
            width: 1px; background-color: var(--line-color);
            z-index: 0; display: none;
        }

        .node {
            display: flex; align-items: flex-start; /* 改为顶端对齐，适合长文换行 */
            margin: 100px 0 100px calc(var(--timeline-left) - 5.5px);
            position: relative; z-index: 10;
        }

        .dot {
            width: 12px; height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%; margin-right: 25px;
            margin-top: 6px; /* 对应文字第一行居中 */
            flex-shrink: 0; box-shadow: 0 0 0 5px var(--bg-color);
        }

        .content { 
            display: flex; flex-direction: column; gap: 6px; 
            /* 关键修改：限制宽度让其在约30字内换行 */
            max-width: 320px; 
        }

        .time { font-size: 11px; color: #bbb; font-family: monospace; }
        .text { 
            color: var(--text-color); font-size: 16px; line-height: 1.7; 
            word-break: break-all; white-space: pre-wrap; 
        }

        /* 动态输入区域 */
        #input-area {
            position: fixed;
            left: 50%; top: 50%;
            width: 90%; max-width: 400px;
            transform: translate(-50%, -50%);
            z-index: 100;
            transition: top 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s ease;
        }

        /* 激活状态：位置稍微上调 */
        #input-area.bottom-fixed {
            top: calc(100% - 120px); /* 原为 80px，现在上提了 */
            transform: translate(-50%, 0);
        }

        input {
            width: 100%; padding: 16px 28px;
            border: 1px solid #eee; border-radius: 40px;
            background: white; font-size: 15px; outline: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        #top-bar { 
            position: fixed; top: 20px; right: 30px; z-index: 100; 
            display: flex; gap: 15px; opacity: 0; transition: opacity 1s ease;
        }
        .active-ui { opacity: 1 !important; }
        .btn { background: none; border: none; color: #ddd; font-size: 10px; cursor: pointer; letter-spacing: 1.5px; }
        .btn:hover { color: #333; }
    </style>
</head>
<body>

    <div class="edge-mask top-mask"></div>
    <div class="edge-mask bottom-mask"></div>

    <div id="top-bar">
        <button class="btn" onclick="exportHistory()">EXPORT导出</button>
        <button class="btn" onclick="clearHistory()">RESET清除</button>
    </div>

    <div id="timeline-container">
        <div id="timeline-inner">
            <div id="v-line"></div>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="textInput" placeholder="记录此刻" autocomplete="off"autocorrect="off" autocapitalize="off" 
    spellcheck="false"name="my-unique-note-input">
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        const input = document.getElementById('textInput');
        const inputArea = document.getElementById('input-area');
        const container = document.getElementById('timeline-container');
        const topBar = document.getElementById('top-bar');
        const masks = document.querySelectorAll('.edge-mask');
        const inner = document.getElementById('timeline-inner');
        const vLine = document.getElementById('v-line');
        const STORAGE_KEY = 'timeline_v_final_styled';

        window.onload = () => {
            const history = getHistory();
            if (history.length > 0) {
                activateUI(true); 
                history.forEach(item => renderNode(item.text, item.time));
                updateLine();
                setTimeout(() => scrollToNode(inner.lastElementChild), 300);
            }
        };

        input.addEventListener('focus', () => activateUI(false));

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                activateUI(false);
                const text = input.value.trim();
                const now = new Date();
                const timeStr = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
                
                saveData(text, timeStr);
                const newNode = renderNode(text, timeStr);
                updateLine();
                
                input.value = "";
                setTimeout(() => scrollToNode(newNode), 50);
            }
        });

        function activateUI(immediate) {
            inputArea.classList.add('bottom-fixed');
            setTimeout(() => {
                container.classList.add('active-container');
                topBar.classList.add('active-ui');
                masks.forEach(m => m.classList.add('active-mask'));
            }, immediate ? 0 : 300);
        }

        function getHistory() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function renderNode(text, time) {
            const node = document.createElement('div');
            node.className = 'node';
            // 将时间放在文字上方，配合窄版换行更美观
            node.innerHTML = `
                <div class="dot"></div>
                <div class="content">
                    <span class="time">${time}</span>
                    <span class="text">${text}</span>
                </div>
            `;
            inner.appendChild(node);
            return node;
        }

        function updateLine() {
            const nodes = document.querySelectorAll('.node');
            if (nodes.length >= 2) {
                vLine.style.display = 'block';
                const firstDotTop = nodes[0].offsetTop + 12; // 调整为圆心
                const lastDotTop = nodes[nodes.length - 1].offsetTop + 12;
                vLine.style.top = firstDotTop + 'px';
                vLine.style.height = (lastDotTop - firstDotTop) + 'px';
            }
        }

        function scrollToNode(node) {
            if (!node) return;
            const offset = node.offsetTop - (container.clientHeight / 2) + (node.clientHeight / 2);
            container.scrollTo({ top: offset, behavior: 'smooth' });
        }

        function saveData(text, time) {
            const history = getHistory();
            history.push({ text, time });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function exportHistory() {
            const history = getHistory();
            if (history.length === 0) return;
            const content = history.map(item => `[${item.time}] ${item.text}`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `my_moments.txt`;
            a.click();
        }

        function clearHistory() {
            if (confirm("RESET ALL?")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }
    </script>
</body>
</html>
