<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结绳记事时间轴</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --line-color: #ccc;
            --accent-color: #333;
            --text-color: #444;
            --timeline-left: 25%;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        /* 边缘遮罩 */
        .edge-mask {
            position: fixed; left: 0; width: 100%; z-index: 10; pointer-events: none;
        }
        .top-mask { top: 0; height: 40vh; background: linear-gradient(to bottom, var(--bg-color) 20%, transparent); }
        .bottom-mask { bottom: 0; height: 45vh; background: linear-gradient(to top, var(--bg-color) 30%, transparent); }

        /* 容器 */
        #timeline-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        #timeline-container::-webkit-scrollbar { display: none; }

        #timeline-inner {
            position: relative;
            width: 100%;
            padding: 50vh 0; /* 确保首尾都能居中 */
        }

        /* 动态绳索 */
        #v-line {
            position: absolute;
            left: var(--timeline-left);
            width: 1px;
            background-color: var(--line-color);
            z-index: 0;
            display: none;
            transition: height 0.5s ease, top 0.5s ease;
        }

        .node {
            display: flex; align-items: center;
            margin: 100px 0 100px calc(var(--timeline-left) - 5.5px);
            position: relative; z-index: 1;
        }

        .dot {
            width: 12px; height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%; margin-right: 25px;
            flex-shrink: 0;
            box-shadow: 0 0 0 5px var(--bg-color);
        }

        .content { display: flex; align-items: center; gap: 15px; }
        .time { font-size: 12px; color: #bbb; font-family: monospace; white-space: nowrap; }
        .text { color: var(--text-color); font-size: 16px; line-height: 1.6; max-width: 45vw; }

        /* 输入区域 */
        #input-area {
            position: fixed;
            bottom: 60px; left: 50%;
            transform: translateX(-50%);
            width: 70%; max-width: 400px;
            z-index: 100;
        }

        input {
            width: 100%; padding: 15px 25px;
            border: 1px solid #eee; border-radius: 40px;
            background: white; font-size: 15px; outline: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            text-align: center;
        }

        /* 右上角工具栏 */
        #top-bar { position: fixed; top: 20px; right: 30px; z-index: 100; display: flex; gap: 15px; }
        .btn { background: none; border: none; color: #ddd; font-size: 11px; cursor: pointer; letter-spacing: 1px; transition: 0.3s; }
        .btn:hover { color: #333; }
        .clear-btn:hover { color: #ff4d4f; }
    </style>
</head>
<body>

    <div class="edge-mask top-mask"></div>
    <div class="edge-mask bottom-mask"></div>

    <div id="top-bar">
        <button class="btn" onclick="exportHistory()">EXPORT导出</button>
        <button class="btn clear-btn" onclick="clearHistory()">RESET清除</button>
    </div>

    <div id="timeline-container">
        <div id="timeline-inner">
            <div id="v-line"></div>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="textInput" placeholder="写下这一刻..." autocomplete="off">
    </div>

    <script>
        const input = document.getElementById('textInput');
        const container = document.getElementById('timeline-container');
        const inner = document.getElementById('timeline-inner');
        const vLine = document.getElementById('v-line');
        const STORAGE_KEY = 'timeline_v_final';

        window.onload = () => {
            const history = getHistory();
            if (history.length > 0) {
                history.forEach(item => renderNode(item.text, item.time));
                updateLine();
                setTimeout(() => scrollToNode(inner.lastElementChild), 200);
            }
        };

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const text = input.value.trim();
                const now = new Date();
                const timeStr = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
                
                saveData(text, timeStr);
                const newNode = renderNode(text, timeStr);
                updateLine();
                
                input.value = "";
                scrollToNode(newNode);
            }
        });

        function getHistory() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function renderNode(text, time) {
            const node = document.createElement('div');
            node.className = 'node';
            node.innerHTML = `
                <div class="dot"></div>
                <div class="content">
                    <span class="time">${time}</span>
                    <span class="text">${text}</span>
                </div>
            `;
            inner.appendChild(node);
            return node;
        }

        function updateLine() {
            const nodes = document.querySelectorAll('.node');
            if (nodes.length >= 2) {
                vLine.style.display = 'block';
                const firstDotTop = nodes[0].offsetTop + 6;
                const lastDotTop = nodes[nodes.length - 1].offsetTop + 6;
                vLine.style.top = firstDotTop + 'px';
                vLine.style.height = (lastDotTop - firstDotTop) + 'px';
            } else {
                vLine.style.display = 'none';
            }
        }

        function scrollToNode(node) {
            if (!node) return;
            const offset = node.offsetTop - (container.clientHeight / 2) + (node.clientHeight / 2);
            container.scrollTo({ top: offset, behavior: 'smooth' });
        }

        function saveData(text, time) {
            const history = getHistory();
            history.push({ text, time });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function exportHistory() {
            const history = getHistory();
            if (history.length === 0) return alert("暂无记录可导出");
            
            const content = history.map(item => `[${item.time}] ${item.text}`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `timeline_export_${new Date().getTime()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearHistory() {
            if (confirm("确定要永久抹掉所有记录吗？建议清空前先执行 EXPORT。")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }
    </script>
</body>
</html>
